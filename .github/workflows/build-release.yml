name: Build Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version (e.g., 1.0.0-beta)'
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install tools
      run: pip install platformio esptool

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: pio-${{ hashFiles('arduino/platformio.ini') }}
        restore-keys: pio-

    - name: Resolve version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
        elif [[ -n "${{ github.event.inputs.version_override }}" ]]; then
          VERSION="${{ github.event.inputs.version_override }}"
          echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
        else
          VERSION="dev-$(date +%Y%m%d)-$(git rev-parse --short HEAD)"
          echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Build SuperMini firmware + filesystem
      run: |
        cd arduino
        pio run -e supermini
        pio run -e supermini -t buildfs

    - name: Build XIAO firmware + filesystem
      run: |
        cd arduino
        pio run -e xiao
        pio run -e xiao -t buildfs

    - name: Merge SuperMini binary
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}
        BOOT_APP=$(find ~/.platformio -name "boot_app0.bin" | head -1)
        esptool --chip esp32s3 merge_bin \
          --flash_mode dio --flash_freq 80m --flash_size 4MB \
          -o k7controller-supermini-v${VERSION}.bin \
          0x0      arduino/.pio/build/supermini/bootloader.bin \
          0x8000   arduino/.pio/build/supermini/partitions.bin \
          0xe000   $BOOT_APP \
          0x10000  arduino/.pio/build/supermini/firmware.bin \
          0x300000 arduino/.pio/build/supermini/littlefs.bin
        echo "SuperMini binary: $(wc -c < k7controller-supermini-v${VERSION}.bin) bytes"

    - name: Merge XIAO binary
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}
        BOOT_APP=$(find ~/.platformio -name "boot_app0.bin" | head -1)
        esptool --chip esp32s3 merge_bin \
          --flash_mode dio --flash_freq 80m --flash_size 8MB \
          -o k7controller-xiao-v${VERSION}.bin \
          0x0      arduino/.pio/build/xiao/bootloader.bin \
          0x8000   arduino/.pio/build/xiao/partitions.bin \
          0xe000   $BOOT_APP \
          0x10000  arduino/.pio/build/xiao/firmware.bin \
          0x300000 arduino/.pio/build/xiao/littlefs.bin
        echo "XIAO binary: $(wc -c < k7controller-xiao-v${VERSION}.bin) bytes"

    - name: Generate manifests
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}
        cat > manifest-supermini.json << EOF
        {
          "name": "K7 LED Controller (SuperMini)",
          "version": "${VERSION}",
          "new_install_prompt_erase": true,
          "funding_url": "https://github.com/bitbarista/k7-led-controller",
          "builds": [
            {
              "chipFamily": "ESP32-S3",
              "parts": [{ "path": "k7controller-supermini-v${VERSION}.bin", "offset": 0 }]
            }
          ]
        }
        EOF
        cat > manifest-xiao.json << EOF
        {
          "name": "K7 LED Controller (XIAO)",
          "version": "${VERSION}",
          "new_install_prompt_erase": true,
          "funding_url": "https://github.com/bitbarista/k7-led-controller",
          "builds": [
            {
              "chipFamily": "ESP32-S3",
              "parts": [{ "path": "k7controller-xiao-v${VERSION}.bin", "offset": 0 }]
            }
          ]
        }
        EOF

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: k7controller-v${{ steps.version.outputs.VERSION }}
        path: |
          k7controller-supermini-v${{ steps.version.outputs.VERSION }}.bin
          k7controller-xiao-v${{ steps.version.outputs.VERSION }}.bin
          manifest-supermini.json
          manifest-xiao.json
        retention-days: 90

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: master

    - name: Extract version from tag
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: k7controller-v${{ steps.version.outputs.VERSION }}
        path: artifacts/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: K7 LED Controller v${{ steps.version.outputs.VERSION }}
        files: artifacts/*
        body: |
          ## K7 LED Controller v${{ steps.version.outputs.VERSION }}

          ### Installation

          **Easiest — browser-based flash (Chrome/Edge/Opera):**
          Visit the [flash page](https://bitbarista.github.io/k7-led-controller/flash.html), connect your board via USB, and click Install.

          **Manual — esptool:**
          ```
          # ESP32-S3 SuperMini (4 MB flash)
          esptool --chip esp32s3 write_flash 0x0 k7controller-supermini-v${{ steps.version.outputs.VERSION }}.bin

          # Seeed XIAO ESP32-S3 (8 MB flash)
          esptool --chip esp32s3 write_flash 0x0 k7controller-xiao-v${{ steps.version.outputs.VERSION }}.bin
          ```

          ### After flashing
          1. Connect to **K7-Setup** WiFi (open network)
          2. Browse to **http://192.168.5.1**
          3. Select your lamp and save
          4. Connect to your **lamp's WiFi** (K7-XXXXXX)
          5. Browse to **http://k7controller.local**

          > To reset to setup mode, hold the BOOT button on the board while powering on for 3 seconds.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update website with latest binaries and manifests
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}

        # Remove stale binaries
        rm -f website/releases/latest/k7controller-*.bin

        # Copy new binaries and manifests
        cp "artifacts/k7controller-supermini-v${VERSION}.bin" "website/releases/latest/k7controller-supermini-v${VERSION}.bin"
        cp "artifacts/k7controller-xiao-v${VERSION}.bin"      "website/releases/latest/k7controller-xiao-v${VERSION}.bin"

        cat > website/releases/latest/manifest-supermini.json << EOF
        {
          "name": "K7 LED Controller (SuperMini)",
          "version": "${VERSION}",
          "new_install_prompt_erase": true,
          "funding_url": "https://github.com/bitbarista/k7-led-controller",
          "builds": [
            {
              "chipFamily": "ESP32-S3",
              "parts": [{ "path": "k7controller-supermini-v${VERSION}.bin", "offset": 0 }]
            }
          ]
        }
        EOF

        cat > website/releases/latest/manifest-xiao.json << EOF
        {
          "name": "K7 LED Controller (XIAO)",
          "version": "${VERSION}",
          "new_install_prompt_erase": true,
          "funding_url": "https://github.com/bitbarista/k7-led-controller",
          "builds": [
            {
              "chipFamily": "ESP32-S3",
              "parts": [{ "path": "k7controller-xiao-v${VERSION}.bin", "offset": 0 }]
            }
          ]
        }
        EOF

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add website/releases/latest/
        git commit -m "Update flash binaries and manifests for v${{ steps.version.outputs.VERSION }}"
        git push origin master
